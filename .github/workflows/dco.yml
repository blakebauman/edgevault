name: DCO
on:
  pull_request:
    branches: [main]

# Enforce the Developer Certificate of Origin: every commit in a PR must carry a
# Signed-off-by trailer (git commit -s). See CONTRIBUTING.md.
jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          for sha in $(git rev-list "$BASE..$HEAD"); do
            # Skip merge commits (more than one parent).
            if [ "$(git rev-list --parents -n1 "$sha" | wc -w)" -gt 2 ]; then continue; fi
            subject=$(git log -1 --format='%s' "$sha")
            if ! git log -1 --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::Commit ${sha} (${subject}) is missing a Signed-off-by line"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "All commits must be signed off: git commit -s (or amend with --signoff). See CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits signed off ✔"
